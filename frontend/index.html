<!DOCTYPE html>
<html>

<head>
    <title>Smart Resume Analyzer</title>
</head>

<body>

    <h1>Smart Resume Analyzer</h1>


    <input type="file" id="resumeFile">

    <h3>Job Description</h3>

    <textarea id="jobDescription" rows="10" cols="60" placeholder="Paste Job Description Here">
</textarea>

    <br><br>

    <button id="uploadBtn">
        Upload Resume
    </button>

    <p id="uploadStatus">
        No file selected
    </p>


    <button id="btn">
        Get Data From Backend
    </button>

    <p id="output">
        Data will appear here
    </p>

    <script src="script.js"></script>

</body>

</html>
